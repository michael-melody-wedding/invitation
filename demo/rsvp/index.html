le\":\"Wedding Parties\",\"subtitle\":\"Meet our favorite people.\",\"image\":\"../../demo/kevin-wedding/details-parties.png?v=38c503188d\"},{\"id\":\"travel\",\"title\":\"Travel Logistics\",\"subtitle\":\"Plan your trip and stay.\",\"image\":\"../../templates/kevin-wedding/details-travel.webp\"},{\"id\":\"registry\",\"title\":\"Registry\",\"subtitle\":\"Your presence is enough, but if you insist...\",\"image\":\"../../demo/kevin-wedding/details-registry.jpg?v=f71a634603\"},{\"id\":\"dress-code\",\"title\":\"Dress Code\",\"subtitle\":\"Summer garden party vibes.\",\"image\":\"../../templates/kevin-wedding/details-dresscode.png\"},{\"id\":\"dinner-menu\",\"title\":\"Dinner Menu\",\"subtitle\":\"A quick look at what we are serving.\",\"image\":\"../../demo/kevin-wedding/details-dining.png?v=2a2c3f25ef\"},{\"id\":\"music\",\"title\":\"Music\",\"subtitle\":\"Cocktail hour and dance party playlists.\",\"image\":\"../../demo/kevin-wedding/details-music.jpg?v=c0a15c4456\"}],\"overlayPages\":{\"parties\":{\"type\":\"parties\",\"title\":\"Wedding Parties\",\"description\":\"Introduce the people standing with you on the wedding day and add their names, roles, and photos here.\",\"groups\":[{\"id\":\"bridal-party\",\"title\":\"Bridal Party\",\"members\":[{\"id\":\"bridal-party-1\",\"name\":\"Member 1\",\"role\":\"\",\"image\":\"\"},{\"id\":\"bridal-party-2\",\"name\":\"Member 2\",\"role\":\"\",\"image\":\"\"},{\"id\":\"bridal-party-3\",\"name\":\"Member 3\",\"role\":\"\",\"image\":\"\"},{\"id\":\"bridal-party-4\",\"name\":\"Member 4\",\"role\":\"\",\"image\":\"\"},{\"id\":\"bridal-party-5\",\"name\":\"Member 5\",\"role\":\"\",\"image\":\"\"},{\"id\":\"bridal-party-6\",\"name\":\"Member 6\",\"role\":\"\",\"image\":\"\"}]},{\"id\":\"grooms-party\",\"title\":\"Groom’s Party\",\"members\":[{\"id\":\"grooms-party-1\",\"name\":\"Member 1\",\"role\":\"\",\"image\":\"\"},{\"id\":\"grooms-party-2\",\"name\":\"Member 2\",\"role\":\"\",\"image\":\"\"},{\"id\":\"grooms-party-3\",\"name\": mo at @[Your Venmo Handle].\",\"isVisible\":true},{\"id\":\"thank-you\",\"title\":\"A Note on Gifts\",\"subtitle\":\"Thank You\",\"body\":\"We are incredibly thankful for your love and support. Having you there matters most.\",\"isVisible\":true}]},\"dress-code\":{\"type\":\"modular\",\"title\":\"Dress Code\",\"description\":\"Think summer garden party.\",\"sections\":[{\"id\":\"ladies\",\"title\":\"For the Ladies\",\"subtitle\":\"Elegant, colorful, and comfortable\",\"body\":\"Tea or floor-length dresses are welcome. Bright colors and florals are encouraged.\\n\\nWear comfortable shoes for wandering and dancing.\",\"isVisible\":true},{\"id\":\"gentlemen\",\"title\":\"For the Gentlemen\",\"subtitle\":\"Classic with a summer touch\",\"body\":\"Dress shirts and suits are perfect. Linen and lighter colors are encouraged.\\n\\nKeep things polished but breathable for a warm summer evening.\",\"isVisible\":true}]},\"dinner-menu\":{\"type\":\"modular\",\"title\":\"Dinner Menu\",\"description\":\"We are working with our caterer to finalize a delicious multi-course meal for everyone.\",\"sections\":[{\"id\":\"cocktail-hour\",\"title\":\"Cocktail Hour\",\"subtitle\":\"Passed Canapes\",\"body\":\"Seasonal tartlet with whipped goat cheese and herbs.\\n\\nCrispy prawn skewer with citrus aioli.\\n\\nTruffle arancini with parmesan.\",\"isVisible\":true},{\"id\":\"main-course\",\"title\":\"Main Course\",\"subtitle\":\"Plated Dinner\",\"body\":\"Herb-roasted chicken with garlic mashed potatoes and market vegetables.\\n\\nMiso-glazed salmon with jasmine rice and bok choy.\\n\\nWild mushroom risotto with roasted asparagus.\",\"isVisible\":true},{\"id\":\"dietary-restrictions\",\"title\":\"Dietary Restrictions\",\"subtitle\":\"We can accommodate\",\"body\":\"Please include allergies and dietary restrictions with your RSVP.\\n\\nVegetarian, gluten-free, and dairy-free options will be available.\",\"isVisible\":true}]},\"music\":{\"type\":\"music\",\"title\":\"Music\",\"description\":\"Set the tone for the weekend with a playlist that feels like you.\",\"playlistTitle\":\"Wedding Playlist\",\"spotifyUrl\":\"https://open.spotify.com/playlist/01TpxUAxN2oxkZcxJgG3cG\",\"note\":\"Paste a Spotify playlist, album, or track URL and we will turn it into an embed automatically.\"}}}},{\"id\":\"vision\",\"isVisible\":true,\"isLocked\":false,\"props\":{\"text\":\"The vision for the night is simple: all of our most beloved people in one place that happens to have a gorgeous garden, flowing drinks, and an unforgettable dance floor.\",\"fontSize\":\"base\"}},{\"id\":\"faq\",\"isVisible\":true,\"isLocked\":false,\"props\":{\"title\":\"Questions and answers\",\"intro\":\"Can't find the answer here?\",\"contactLabel\":\"Reach out to Michael or Melody\",\"contactHref\":\"mailto:your-email@example.com?subject=Wedding%20Question\",\"contactEmails\":\"your-email@example.com\",\"contactSubject\":\"Wedding Question\",\"contactModalEnabled\":true,\"contactDefaultAction\":\"mailto\",\"items\":[{\"question\":\"When should I RSVP by?\",\"answer\":\"Please RSVP by August 20, 2027.\"},{\"question\":\"Is there a dress code?\",\"answer\":\"Yes! Think Summer Garden Party.\\n\\nFor the ladies: tea or floor length dresses. We welcome bright colours and florals.\\n\\nFor the gentlemen: dress shirts and suits. We welcome linen and light colours.\\n\\nWear comfy shoes for wandering (and dancing!) and anything else that makes you feel fabulous and ready to party!\"},{\"question\":\"Is the wedding outdoors?\",\"answer\":\"Yes! The ceremony will take place in the garden and the reception will take place on the terrace.\"},{\"question\":\"What will the weather be like? What happens if it rains?\",\"answer\":\"Expect a warm afternoon and a cooler evening. We recommend bringing a light layer just in case.\\n\\nIf the weather shifts, the venue has an indoor backup plan ready to go.\"},{\"question\":\"Can I bring a plus one or my kids?\",\"answer\":\"We are keeping the guest list intimate, so plus-ones and children may be limited depending on your invitation.\\n\\nPlease reach out if you have any questions about your household.\"},{\"question\":\"What time should I arrive at the ceremony?\",\"answer\":\"Please plan to arrive about 15 minutes before the ceremony begins so everyone has time to get settled.\"},{\"question\":\"I have a food allergy, can I make a special request?\",\"answer\":\"Yes! Please make note of any food allergies or restrictions when submitting your RSVP and we will do our best to accommodate.\"},{\"question\":\"Is there parking at the venue?\",\"answer\":\"Use this answer to share parking, drop-off, shuttle, or rideshare instructions for your venue.\"},{\"question\":\"Help! I have other questions!\",\"answer\":\"Please reach out at your-email@example.com with any other questions.\\n\\nWe cannot wait to celebrate with you.\"}]}},{\"id\":\"footer\",\"isVisible\":true,\"isLocked\":true,\"props\":{\"quote\":\"you’re my favorite person to do anything with for the rest of my life.\",\"backgroundImage\":\"../../demo/kevin-wedding/footer.png?v=e1e311b42a\"}}]},\"rsvp\":{\"sections\":[{\"id\":\"rsvpSearch\",\"isVisible\":true,\"isLocked\":true,\"props\":{\"title\":\"RSVP\",\"subtitle\":\"Find Your Invitation\",\"firstNamePlaceholder\":\"First Name\",\"lastNamePlaceholder\":\"Last Name\",\"searchButtonLabel\":\"Search\",\"selectPartyLabel\":\"Select Your Party\",\"emptyState\":\"No matches found. Please try entering only your first or last name exactly as written on the invitation.\"}},{\"id\":\"rsvpOverview\",\"isVisible\":true,\"isLocked\":true,\"props\":{\"title\":\"You're responding for\",\"selectGuestsLabel\":\"Select Guests\",\"backLabel\":\"Back\",\"startLabel\":\"Start RSVP\",\"updateLabel\":\"Update RSVP\",\"noEventsMessage\":\"No RSVP-enabled events are currently available for the selected guests.\",\"selectGuestError\":\"Please select at least one guest.\"}},{\"id\":\"rsvpAttendance\",\"isVisible\":true,\"isLocked\":true,\"props\": un momento importante\",\"moments.1.title\":\"capítulo dos: enamorándonos\",\"moments.1.body\":\"Entre primeras citas y rutinas compartidas, esta parte de la historia empezó a sentirse real.\",\"moments.1.photos.0.photoTitle\":\"Agrega un recuerdo de viaje\",\"moments.1.photos.1.photoTitle\":\"Agrega un momento espontáneo\",\"moments.1.photos.2.photoTitle\":\"Agrega una tradición favorita\",\"moments.2.title\":\"capítulo tres: el siguiente paso\",\"moments.2.body\":\"En algún momento dejamos de imaginar el futuro por separado y empezamos a planearlo juntos.\",\"moments.2.photos.0.photoTitle\":\"Agrega la propuesta o el anuncio\",\"moments.2.photos.1.photoTitle\":\"Agrega una foto de celebración\",\"moments.2.photos.2.photoTitle\":\"Agrega lo que viene después\"},\"event\":{\"kicker\":\"así que acompáñanos...\",\"date\":\"18 de septiembre de 2027\",\"rsvpNote\":\"Confirma tu asistencia antes del 20 de agosto de 2027\"},\"fullSchedule\":{\"title\":\"programa completo\"},\"details\":{\"title\":\"y ahora algunos detalles adicionales...\",\"subtitle\":\"Las personas, lugares y detalles prácticos para que el fin de semana sea sencillo.\",\"cards.0.title\":\"Cortejo nupcial\",\"cards.0.subtitle\":\"Conoce a nuestras personas favoritas.\",\"cards.1.title\":\"Detalles de viaje\",\"cards.1.subtitle\":\"Planifica tu viaje y estadía.\",\"cards.2.title\":\"Registro\",\"cards.2.subtitle\":\"Tu presencia es suficiente, pero si insistes...\",\"cards.3.title\":\"Código de vestimenta\",\"cards.3.subtitle\":\"Ambiente de fiesta de jardín de verano.\",\"cards.4.title\":\"Menú de cena\",\"cards.4.subtitle\":\"Un vistazo a lo que serviremos.\",\"cards.5.title\":\"Música\",\"cards.5.subtitle\":\"Listas para el cóctel y la pista de baile.\",\"overlayPages.parties.title\":\"Cortejo nupcial\",\"overlayPages.parties.description\":\"Presenta a las personas que estarán contigo el día de la boda y agrega sus nombres, roles y fotos aquí.\",\"overlayPages.parties.groups.0.title\":\"Damas de honor\",\"overlayPages.parties.groups.1.title\":\"Caballeros de honor\",\"overlayPages.travel.title\":\"Viaje y alojamiento\",\"overlayPages.travel.description\":\"Usa esta página para ayudar a tus invitados a planear el viaje, reservar alojamiento y moverse durante el fin de semana con menos dudas.\",\"overlayPages.travel.sections.0.title\":\"Vuelo\",\"overlayPages.travel.sections.0.subtitle\":\"Cómo llegar\",\"overlayPages.travel.sections.0.body\":\"Agrega el aeropuerto, estación de tren o indicaciones de manejo más convenientes para que los invitados planeen su viaje.\",\"overlayPages.travel.sections.1.title\":\"Nota de viaje\",\"overlayPages.travel.sections.1.subtitle\":\"Dónde hospedarse\",\"overlayPages.travel.sections.1.body\":\"Comparte tu bloque de hotel, barrio recomendado o sugerencias de alojamiento para que los invitados sepan dónde quedarse.\",\"overlayPages.travel.sections.2.title\":\"Nota de viaje\",\"overlayPages.travel.sections.2.subtitle\":\"Transporte al lugar\",\"overlayPages.travel.sections.2.body\":\"Explica estacionamiento, transporte, disponibilidad de viajes compartidos o instrucciones de llegada que los invitados deban conocer.\",\"overlayPages.travel.sections.3.title\":\"Cosas para hacer\",\"overlayPages.travel.sections.3.subtitle\":\"Cerca de la zona\",\"overlayPages.travel.sections.3.body\":\"Incluye restaurantes, cafeterías, lugares para visitar o actividades de fin de semana para invitados de fuera.\",\"overlayPages.registry.title\":\"Registro\",\"overlayPages.registry.description\":\"Tu presencia en nuestra boda es el mejor regalo. Si quieres honrarnos con un obsequio, una contribución para nuestro futuro juntos significaría mucho.\",\"overlayPages.registry.sections.0.title\":\"Para invitados de Canadá\",\"overlayPages.registry.sections.0.subtitle\":\"Interac e-Transfer\",\"overlayPages.registry.sections.0.body\":\"Aceptamos con gratitud transferencias e-Transfer enviadas a [Tu dirección de correo].\",\"overlayPages.registry.sections.1.title\":\"Para invitados de Estados Unidos\",\"overlayPages.registry.sections.1.subtitle\":\"Venmo\",\"overlayPages.registry.sections.1.body\":\"Aceptamos con gratitud contribuciones por Venmo en @[Tu usuario de Venmo].\",\"overlayPages.registry.sections.2.title\":\"Una nota sobre regalos\",\"overlayPages.registry.sections.2.subtitle\":\"Gracias\",\"overlayPages.registry.sections.2.body\":\"Estamos profundamente agradecidos por su amor y apoyo. Tenerlos allí es lo más importante.\",\"overlayPages.dress-code.title\":\"Código de vestimenta\",\"overlayPages.dress-code.description\":\"Piensa en una fiesta de jardín de verano.\",\"overlayPages.dress-code.sections.0.title\":\"Para las mujeres\",\"overlayPages.dress-code.sections.0.subtitle\":\"Elegante, colorido y cómodo\",\"overlayPages.dress-code.sections.0.body\":\"Vestidos de té o largos son bienvenidos. Se recomiendan colores vivos y estampados florales.\\n\\nUsa zapatos cómodos para caminar y bailar.\",\"overlayPages.dress-code.sections.1.title\":\"Para los hombres\",\"overlayPages.dress-code.sections.1.subtitle\":\"Clásico con un toque de verano\",\"overlayPages.dress-code.sections.1.body\":\"Camisas de vestir y trajes son perfectos. Se recomiendan lino y colores claros.\\n\\nMantén un estilo elegante pero fresco para una tarde cálida de verano.\",\"overlayPages.dinner-menu.title\":\"Menú de cena\",\"overlayPages.dinner-menu.description\":\"Estamos trabajando con nuestro catering para finalizar una deliciosa comida de varios tiempos para todos.\",\"overlayPages.dinner-menu.sections.0.title\":\"Cóctel\",\"overlayPages.dinner-menu.sections.0.subtitle\":\"Canapés servidos\",\"overlayPages.dinner-menu.sections.0.body\":\"Tartaleta de temporada con queso de cabra batido y hierbas.\\n\\nBrocheta crujiente de camarón con alioli cítrico.\\n\\nArancini de trufa con parmesano.\",\"overlayPages.dinner-menu.sections.1.title\":\"Plato principal\",\"overlayPages.dinner-menu.sections.1.subtitle\":\"Cena servida\",\"overlayPages.dinner-menu.sections.1.body\":\"Pollo asado con hierbas, puré de papas con ajo y verduras de mercado.\\n\\nSalmón glaseado con miso, arroz jazmín y bok choy.\\n\\nRisotto de hongos silvestres con espárragos asados.\",\"overlayPages.dinner-menu.sections.2.title\":\"Restricciones alimentarias\",\"overlayPages.dinner-menu.sections.2.subtitle\":\"Podemos acomodarlas\",\"overlayPages.dinner-menu.sections.2.body\":\"Incluye alergias y restricciones alimentarias en tu RSVP.\\n\\nHabrá opciones vegetarianas, sin gluten y sin lácteos.\",\"overlayPages.music.title\":\"Música\",\"overlayPages.music.description\":\"Marca el tono del fin de semana con una lista que se sienta como ustedes.\",\"overlayPages.music.playlistTitle\":\"Lista de boda\",\"overlayPages.music.note\":\"Pega una URL de playlist, álbum o canción de Spotify y la convertiremos automáticamente en un reproductor.\"},\"vision\":{\"text\":\"La visión de la noche es sencilla: todas nuestras personas más queridas en un lugar con un jardín precioso, bebidas y una pista de baile inolvidable.\"},\"faq\":{\"title\":\"Preguntas y respuestas\",\"intro\":\"¿No encuentras la respuesta aquí?\",\"contactLabel\":\"Escríbenos\",\"items.0.question\":\"¿Cuándo debo confirmar mi asistencia?\",\"items.0.answer\":\"Confirma tu asistencia antes del 20 de agosto de 2027.\",\"items.1.question\":\"¿Hay código de vestimenta?\",\"items.1.answer\":\"¡Sí! Piensa en una fiesta de jardín de verano.\\n\\nPara las mujeres: vestidos de té o largos. Nos encantan los colores vivos y los estampados florales.\\n\\nPara los hombres: camisas de vestir y trajes. Nos encantan el lino y los colores claros.\\n\\nUsa zapatos cómodos para caminar (¡y bailar!) y cualquier cosa que te haga sentir fabuloso y listo para celebrar.\",\"items.2.question\":\"¿La boda será al aire libre?\",\"items.2.answer\":\"¡Sí! La ceremonia será en el jardín y la recepción será en la terraza.\",\"items.3.question\":\"¿Cómo estará el clima? ¿Qué pasa si llueve?\",\"items.3.answer\":\"Espera una tarde cálida y una noche más fresca. Recomendamos traer una capa ligera por si acaso.\\n\\nSi el clima cambia, el lugar tiene listo un plan alternativo bajo techo.\",\"items.4.question\":\"¿Puedo llevar acompañante o a mis hijos?\",\"items.4.answer\":\"Queremos mantener una lista de invitados íntima, así que los acompañantes y niños pueden estar limitados según tu invitación.\\n\\nEscríbenos si tienes preguntas sobre tu hogar.\",\"items.5.question\":\"¿A qué hora debo llegar a la ceremonia?\",\"items.5.answer\":\"Planea llegar unos 15 minutos antes de que comience la ceremonia para que todos tengan tiempo de acomodarse.\",\"items.6.question\":\"Tengo una alergia alimentaria, ¿puedo hacer una solicitud especial?\",\"items.6.answer\":\"¡Sí! Incluye cualquier alergia o restricción alimentaria al enviar tu RSVP y haremos todo lo posible por acomodarla.\",\"items.7.question\":\"¿Hay estacionamiento en el lugar?\",\"items.7.answer\":\"Usa esta respuesta para compartir instrucciones de estacionamiento, descenso, transporte o viajes compartidos para tu lugar.\",\"items.8.question\":\"¡Ayuda! Tengo otras preguntas.\",\"items.8.answer\":\"Escríbenos a your-email@example.com con cualquier otra pregunta.\\n\\nEstamos ansiosos por celebrar contigo.\"},\"footer\":{\"quote\":\"eres mi persona favorita para hacer cualquier cosa por el resto de mi vida.\"}},\"rsvp\":{\"rsvpSearch\":{\"title\":\"RSVP\",\"subtitle\":\"Busca tu invitación\",\"firstNamePlaceholder\":\"Nombre\",\"lastNamePlaceholder\":\"Apellido\",\"searchButtonLabel\":\"Buscar\",\"selectPartyLabel\":\"Selecciona tu grupo\",\"emptyState\":\"No se encontraron coincidencias. Intenta escribir solo tu nombre o apellido exactamente como aparece en la invitación.\"},\"rsvpOverview\":{\"title\":\"Estás respondiendo por\",\"selectGuestsLabel\":\"Selecciona invitados\",\"backLabel\":\"Atrás\",\"startLabel\":\"Comenzar RSVP\",\"updateLabel\":\"Actualizar RSVP\",\"noEventsMessage\":\"No hay eventos con RSVP disponibles para los invitados seleccionados.\",\"selectGuestError\":\"Selecciona al menos un invitado.\"},\"rsvpAttendance\":{\"stepName\":\"Asistencia\",\"title\":\"Eventos\",\"subtitle\":\"¿Nos acompañarás?\",\"yesLabel\":\"Sí\",\"noLabel\":\"No\",\"backLabel\":\"Atrás\",\"nextLabel\":\"Siguiente\",\"missingResponseError\":\"Selecciona Sí o No para cada evento invitado.\"},\"rsvpDetails\":{\"stepName\":\"Detalles\",\"title\":\"Detalles\",\"subtitle\":\"¿Hay alguna preferencia que debamos conocer?\",\"dietaryLabel\":\"Restricciones alimentarias\",\"dietaryPlaceholder\":\"p. ej. vegetariano, alergia a nueces\",\"accessibilityLabel\":\"Necesidades de accesibilidad\",\"accessibilityPlaceholder\":\"¿Algún acomodo especial?\",\"noAttendingDetailsMessage\":\"No se necesitan detalles adicionales para invitados que no asistirán.\",\"noDetailsMessage\":\"No se necesitan detalles adicionales para este RSVP.\",\"partyDetailsTitle\":\"Detalles del grupo\",\"requiredAnswerErrorTemplate\":\"Responde {{label}}.\",\"backLabel\":\"Atrás\",\"nextLabel\":\"Siguiente\"},\"rsvpReview\":{\"stepName\":\"Revisión\",\"title\":\"Revisión\",\"subtitle\":\"Casi terminamos. Revisa tus detalles.\",\"noneLabel\":\"Ninguno\",\"dietaryLabel\":\"Restricciones alimentarias\",\"accessibilityLabel\":\"Necesidades de accesibilidad\",\"backLabel\":\"Atrás\",\"submitLabel\":\"Enviar RSVP\",\"savingLabel\":\"Guardando...\"},\"rsvpConfirmation\":{\"statusLabel\":\"Guardado\",\"title\":\"¡Guardado!\",\"body\":\"Puedes volver en cualquier momento para actualizar tu RSVP.\",\"returnLabel\":\"Volver a la búsqueda\"}},\"envelope\":{\"introduction\":{\"text\":\"una aventura al país de las maravillas te espera...\"}}},\"fr\":{\"home\":{\"header\":{\"rsvpLabel\":\"Répondre\",\"links.0.label\":\"Voyage\",\"links.1.label\":\"Liste\",\"links.2.label\":\"FAQ\"},\"hero\":{\"scrollPrompt\":\"Faites défiler pour découvrir\"},\"storyIntro\":{\"text\":\"vous êtes cordialement invités à célébrer l’histoire de...\"},\"story\":{\"title\":\"notre histoire\",\"moments.0.title\":\"chapitre un : notre rencontre\",\"moments.0.body\":\"Nous nous sommes rencontrés, avons commencé à parler, puis avons vite voulu continuer à nous découvrir.\",\"moments.0.photos.0.photoTitle\":\"Ajoutez un premier souvenir\",\"moments.0.photos.1.photoTitle\":\"Ajoutez une photo préférée\",\"moments.0.photos.2.photoTitle\":\"Ajoutez un moment important\",\"moments.1.title\":\"chapitre deux : tomber amoureux\",\"moments.1.body\":\"Entre premiers rendez-vous et habitudes partagées, cette partie de l’histoire a commencé à devenir réelle.\",\"moments.1.photos.0.photoTitle\":\"Ajoutez un souvenir de voyage\",\"moments.1.photos.1.photoTitle\":\"Ajoutez un moment spontané\",\"moments.1.photos.2.photoTitle\":\"Ajoutez une tradition préférée\",\"moments.2.title\":\"chapitre trois : la prochaine étape\",\"moments.2.body\":\"À un moment donné, nous avons cessé d’imaginer l’avenir séparément et avons commencé à le préparer ensemble.\",\"moments.2.photos.0.photoTitle\":\"Ajoutez la demande ou l’annonce\",\"moments.2.photos.1.photoTitle\":\"Ajoutez une photo de célébration\",\"moments.2.photos.2.photoTitle\":\"Ajoutez ce qui vient ensuite\"},\"event\":{\"kicker\":\"alors rejoignez-nous...\",\"date\":\"18 septembre 2027\",\"rsvpNote\":\"Répondez avant le 20 août 2027\"},\"fullSchedule\":{\"title\":\"programme complet\"},\"details\":{\"title\":\"et maintenant quelques détails supplémentaires...\",\"subtitle\":\"Les personnes, les lieux et les détails pratiques pour un week-end sans effort.\",\"cards.0.title\":\"Cortège\",\"cards.0.subtitle\":\"Rencontrez nos personnes préférées.\",\"cards.1.title\":\"Voyage\",\"cards.1.subtitle\":\"Planifiez votre trajet et votre séjour.\",\"cards.2.title\":\"Liste\",\"cards.2.subtitle\":\"Votre présence suffit, mais si vous insistez...\",\"cards.3.title\":\"Code vestimentaire\",\"cards.3.subtitle\":\"Ambiance garden-party estivale.\",\"cards.4.title\":\"Menu du dîner\",\"cards.4.subtitle\":\"Un aperçu de ce qui sera servi.\",\"cards.5.title\":\"Musique\",\"cards.5.subtitle\":\"Playlists pour le cocktail et la piste de danse.\",\"overlayPages.parties.title\":\"Cortège\",\"overlayPages.parties.description\":\"Présentez les personnes qui seront à vos côtés le jour du mariage et ajoutez ici leurs noms, rôles et photos.\",\"overlayPages.parties.groups.0.title\":\"Demoiselles d’honneur\",\"overlayPages.parties.groups.1.title\":\"Garçons d’honneur\",\"overlayPages.travel.title\":\"Voyage et hébergement\",\"overlayPages.travel.description\":\"Utilisez cette page pour aider vos invités à organiser leur trajet, réserver un hébergement et se déplacer pendant le week-end plus facilement.\",\"overlayPages.travel.sections.0.title\":\"Vol\",\"overlayPages.travel.sections.0.subtitle\":\"Comment venir\",\"overlayPages.travel.sections.0.body\":\"Ajoutez l’aéroport, la gare ou les indications routières les plus pratiques pour aider les invités à planifier leur voyage.\",\"overlayPages.travel.sections.1.title\":\"Note de voyage\",\"overlayPages.travel.sections.1.subtitle\":\"Où dormir\",\"overlayPages.travel.sections.1.body\":\"Partagez votre bloc hôtelier, le quartier recommandé ou vos conseils d’hébergement pour que les invités sachent où séjourner.\",\"overlayPages.travel.sections.2.title\":\"Note de voyage\",\"overlayPages.travel.sections.2.subtitle\":\"Se rendre au lieu\",\"overlayPages.travel.sections.2.body\":\"Expliquez le stationnement, les navettes, les options de covoiturage ou les consignes d’arrivée utiles avant l’événement.\",\"overlayPages.travel.sections.3.title\":\"À faire\",\"overlayPages.travel.sections.3.subtitle\":\"À proximité\",\"overlayPages.travel.sections.3.body\":\"Ajoutez quelques restaurants, cafés, lieux à visiter ou activités de week-end pour les invités qui viennent de loin.\",\"overlayPages.registry.title\":\"Liste\",\"overlayPages.registry.description\":\"Votre présence à notre mariage est le plus beau des cadeaux. Si vous souhaitez nous offrir quelque chose, une contribution à notre avenir ensemble nous toucherait beaucoup.\",\"overlayPages.registry.sections.0.title\":\"Pour les invités canadiens\",\"overlayPages.registry.sections.0.subtitle\":\"Interac e-Transfer\",\"overlayPages.registry.sections.0.body\":\"Nous acceptons avec gratitude les virements e-Transfer envoyés à [Votre adresse courriel].\",\"overlayPages.registry.sections.1.title\":\"Pour les invités américains\",\"overlayPages.registry.sections.1.subtitle\":\"Venmo\",\"overlayPages.registry.sections.1.body\":\"Nous acceptons avec gratitude les contributions Venmo à @[Votre identifiant Venmo].\",\"overlayPages.registry.sections.2.title\":\"Une note sur les cadeaux\",\"overlayPages.registry.sections.2.subtitle\":\"Merci\",\"overlayPages.registry.sections.2.body\":\"Nous sommes profondément reconnaissants pour votre amour et votre soutien. Votre présence compte le plus.\",\"overlayPages.dress-code.title\":\"Code vestimentaire\",\"overlayPages.dress-code.description\":\"Imaginez une garden-party estivale.\",\"overlayPages.dress-code.sections.0.title\":\"Pour les femmes\",\"overlayPages.dress-code.sections.0.subtitle\":\"Élégant, coloré et confortable\",\"overlayPages.dress-code.sections.0.body\":\"Les robes longueur thé ou longues sont les bienvenues. Les couleurs vives et les motifs floraux sont encouragés.\\n\\nPrévoyez des chaussures confortables pour marcher et danser.\",\"overlayPages.dress-code.sections.1.title\":\"Pour les hommes\",\"overlayPages.dress-code.sections.1.subtitle\":\"Classique avec une touche estivale\",\"overlayPages.dress-code.sections.1.body\":\"Chemises habillées et costumes sont parfaits. Le lin et les couleurs claires sont encouragés.\\n\\nGardez une allure soignée mais respirante pour une chaude soirée d’été.\",\"overlayPages.dinner-menu.title\":\"Menu du dîner\",\"overlayPages.dinner-menu.description\":\"Nous travaillons avec notre traiteur pour finaliser un délicieux repas en plusieurs services pour tout le monde.\",\"overlayPages.dinner-menu.sections.0.title\":\"Cocktail\",\"overlayPages.dinner-menu.sections.0.subtitle\":\"Canapés servis\",\"overlayPages.dinner-menu.sections.0.body\":\"Tartelettes de saison au fromage de chèvre fouetté et aux herbes.\\n\\nBrochette de crevette croustillante avec aïoli aux agrumes.\\n\\nArancini à la truffe et au parmesan.\",\"overlayPages.dinner-menu.sections.1.title\":\"Plat principal\",\"overlayPages.dinner-menu.sections.1.subtitle\":\"Dîner servi à table\",\"overlayPages.dinner-menu.sections.1.body\":\"Poulet rôti aux herbes avec purée de pommes de terre à l’ail et légumes du marché.\\n\\nSaumon glacé au miso avec riz jasmin et bok choy.\\n\\nRisotto aux champignons sauvages avec asperges rôties.\",\"overlayPages.dinner-menu.sections.2.title\":\"Restrictions alimentaires\",\"overlayPages.dinner-menu.sections.2.subtitle\":\"Nous pouvons les accommoder\",\"overlayPages.dinner-menu.sections.2.body\":\"Veuillez indiquer vos allergies et restrictions alimentaires dans votre RSVP.\\n\\nDes options végétariennes, sans gluten et sans produits laitiers seront disponibles.\",\"overlayPages.music.title\":\"Musique\",\"overlayPages.music.description\":\"Donnez le ton du week-end avec une playlist qui vous ressemble.\",\"overlayPages.music.playlistTitle\":\"Playlist du mariage\",\"overlayPages.music.note\":\"Collez une URL de playlist, d’album ou de morceau Spotify et nous la transformerons automatiquement en lecteur intégré.\"},\"vision\":{\"text\":\"La vision de la soirée est simple : réunir toutes les personnes que nous aimons dans un lieu avec un superbe jardin, des boissons et une piste de danse inoubliable.\"},\"faq\":{\"title\":\"Questions et réponses\",\"intro\":\"Vous ne trouvez pas la réponse ici?\",\"contactLabel\":\"Écrivez-nous\",\"items.0.question\":\"Quand dois-je répondre?\",\"items.0.answer\":\"Veuillez répondre avant le 20 août 2027.\",\"items.1.question\":\"Y a-t-il un code vestimentaire?\",\"items.1.answer\":\"Oui! Imaginez une garden-party estivale.\\n\\nPour les femmes : robes longueur thé ou longues. Les couleurs vives et les fleurs sont les bienvenues.\\n\\nPour les hommes : chemises habillées et costumes. Le lin et les couleurs claires sont les bienvenus.\\n\\nPrévoyez des chaussures confortables pour marcher (et danser!) et tout ce qui vous fait vous sentir fabuleux et prêts à célébrer.\",\"items.2.question\":\"Le mariage aura-t-il lieu dehors?\",\"items.2.answer\":\"Oui! La cérémonie aura lieu dans le jardin et la réception aura lieu sur la terrasse.\",\"items.3.question\":\"Quel temps fera-t-il? Que se passe-t-il s’il pleut?\",\"items.3.answer\":\"Attendez-vous à un après-midi chaud et à une soirée plus fraîche. Nous recommandons d’apporter une couche légère au cas où.\\n\\nSi la météo change, le lieu dispose d’un plan de secours intérieur prêt.\",\"items.4.question\":\"Puis-je venir avec un invité ou mes enfants?\",\"items.4.answer\":\"Nous gardons une liste d’invités intime, donc les accompagnants et les enfants peuvent être limités selon votre invitation.\\n\\nÉcrivez-nous si vous avez des questions sur votre foyer.\",\"items.5.question\":\"À quelle heure dois-je arriver à la cérémonie?\",\"items.5.answer\":\"Prévoyez d’arriver environ 15 minutes avant le début de la cérémonie afin que tout le monde ait le temps de s’installer.\",\"items.6.question\":\"J’ai une allergie alimentaire, puis-je faire une demande spéciale?\",\"items.6.answer\":\"Oui! Veuillez indiquer vos allergies ou restrictions alimentaires en envoyant votre RSVP et nous ferons de notre mieux pour les accommoder.\",\"items.7.question\":\"Y a-t-il du stationnement sur place?\",\"items.7.answer\":\"Utilisez cette réponse pour partager les consignes de stationnement, de dépose, de navette ou de covoiturage pour votre lieu.\",\"items.8.question\":\"À l’aide! J’ai d’autres questions.\",\"items.8.answer\":\"Écrivez-nous à your-email@example.com pour toute autre question.\\n\\nNous avons hâte de célébrer avec vous.\"},\"footer\":{\"quote\":\"tu es ma personne préférée avec qui tout faire pour le reste de ma vie.\"}},\"rsvp\":{\"rsvpSearch\":{\"title\":\"RSVP\",\"subtitle\":\"Trouvez votre invitation\",\"firstNamePlaceholder\":\"Prénom\",\"lastNamePlaceholder\":\"Nom\",\"searchButtonLabel\":\"Rechercher\",\"selectPartyLabel\":\"Sélectionnez votre groupe\",\"emptyState\":\"Aucun résultat. Essayez de saisir uniquement votre prénom ou nom exactement comme il apparaît sur l’invitation.\"},\"rsvpOverview\":{\"title\":\"Vous répondez pour\",\"selectGuestsLabel\":\"Sélectionner les invités\",\"backLabel\":\"Retour\",\"startLabel\":\"Commencer le RSVP\",\"updateLabel\":\"Mettre à jour le RSVP\",\"noEventsMessage\":\"Aucun événement avec RSVP n’est disponible pour les invités sélectionnés.\",\"selectGuestError\":\"Sélectionnez au moins un invité.\"},\"rsvpAttendance\":{\"stepName\":\"Présence\",\"title\":\"Événements\",\"subtitle\":\"Serez-vous avec nous?\",\"yesLabel\":\"Oui\",\"noLabel\":\"Non\",\"backLabel\":\"Retour\",\"nextLabel\":\"Suivant\",\"missingResponseError\":\"Sélectionnez Oui ou Non pour chaque événement.\"},\"rsvpDetails\":{\"stepName\":\"Détails\",\"title\":\"Détails\",\"subtitle\":\"Y a-t-il des préférences à connaître?\",\"dietaryLabel\":\"Restrictions alimentaires\",\"dietaryPlaceholder\":\"p. ex. végétarien, allergie aux noix\",\"accessibilityLabel\":\"Besoins d’accessibilité\",\"accessibilityPlaceholder\":\"Des accommodements particuliers?\",\"noAttendingDetailsMessage\":\"Aucun détail supplémentaire n’est nécessaire pour les invités qui ne peuvent pas venir.\",\"noDetailsMessage\":\"Aucun détail supplémentaire n’est nécessaire pour ce RSVP.\",\"partyDetailsTitle\":\"Détails du groupe\",\"requiredAnswerErrorTemplate\":\"Répondez à {{label}}.\",\"backLabel\":\"Retour\",\"nextLabel\":\"Suivant\"},\"rsvpReview\":{\"stepName\":\"Vérification\",\"title\":\"Vérification\",\"subtitle\":\"Presque terminé. Vérifiez vos détails.\",\"noneLabel\":\"Aucun\",\"dietaryLabel\":\"Restrictions alimentaires\",\"accessibilityLabel\":\"Besoins d’accessibilité\",\"backLabel\":\"Retour\",\"submitLabel\":\"Envoyer le RSVP\",\"savingLabel\":\"Enregistrement...\"},\"rsvpConfirmation\":{\"statusLabel\":\"Enregistré\",\"title\":\"Enregistré!\",\"body\":\"Vous pouvez revenir à tout moment pour modifier votre RSVP.\",\"returnLabel\":\"Retour à la recherche\"}},\"envelope\":{\"introduction\":{\"text\":\"une aventure au pays des merveilles vous attend...\"}}},\"de\":{\"home\":{\"header\":{\"rsvpLabel\":\"RSVP senden\",\"links.0.label\":\"Reise\",\"links.1.label\":\"Geschenkeliste\",\"links.2.label\":\"FAQ\"},\"hero\":{\"scrollPrompt\":\"Scrollen zum Erkunden\"},\"storyIntro\":{\"text\":\"du bist herzlich eingeladen, die Geschichte zu feiern von...\"},\"story\":{\"title\":\"unsere Geschichte\",\"moments.0.title\":\"Kapitel eins: wie wir uns kennengelernt haben\",\"moments.0.body\":\"Wir lernten uns kennen, kamen ins Gespräch und wussten bald, dass wir einander weiter kennenlernen wollten.\",\"moments.0.photos.0.photoTitle\":\"Füge eine frühe Erinnerung hinzu\",\"moments.0.photos.1.photoTitle\":\"Füge ein Lieblingsfoto hinzu\",\"moments.0.photos.2.photoTitle\":\"Füge einen Meilenstein hinzu\",\"moments.1.title\":\"Kapitel zwei: wir verliebten uns\",\"moments.1.body\":\"Zwischen ersten Dates und gemeinsamen Routinen fühlte sich dieser Teil der Geschichte immer echter an.\",\"moments.1.photos.0.photoTitle\":\"Füge eine Reiseerinnerung hinzu\",\"moments.1.photos.1.photoTitle\":\"Füge einen spontanen Moment hinzu\",\"moments.1.photos.2.photoTitle\":\"Füge eine Lieblingstradition hinzu\",\"moments.2.title\":\"Kapitel drei: der nächste Schritt\",\"moments.2.body\":\"Irgendwann hörten wir auf, uns die Zukunft getrennt vorzustellen, und begannen, sie gemeinsam zu planen.\",\"moments.2.photos.0.photoTitle\":\"Füge den Antrag oder die Ankündigung hinzu\",\"moments.2.photos.1.photoTitle\":\"Füge ein Feierfoto hinzu\",\"moments.2.photos.2.photoTitle\":\"Füge hinzu, was als Nächstes kommt\"},\"event\":{\"kicker\":\"also feiere mit uns...\",\"date\":\"18. September 2027\",\"rsvpNote\":\"Bitte antworte bis zum 20. August 2027\"},\"fullSchedule\":{\"title\":\"vollständiger Ablauf\"},\"details\":{\"title\":\"und nun ein paar weitere Details...\",\"subtitle\":\"Die Menschen, Orte und praktischen Hinweise, damit das Wochenende entspannt wird.\",\"cards.0.title\":\"Hochzeitsgesellschaft\",\"cards.0.subtitle\":\"Lerne unsere Lieblingsmenschen kennen.\",\"cards.1.title\":\"Reisedetails\",\"cards.1.subtitle\":\"Plane deine Anreise und deinen Aufenthalt.\",\"cards.2.title\":\"Geschenkeliste\",\"cards.2.subtitle\":\"Deine Anwesenheit ist genug, aber wenn du darauf bestehst...\",\"cards.3.title\":\"Dresscode\",\"cards.3.subtitle\":\"Sommerliche Gartenparty-Atmosphäre.\",\"cards.4.title\":\"Dinner-Menü\",\"cards.4.subtitle\":\"Ein Ausblick auf das, was serviert wird.\",\"cards.5.title\":\"Musik\",\"cards.5.subtitle\":\"Playlists für Cocktailstunde und Tanzfläche.\",\"overlayPages.parties.title\":\"Hochzeitsgesellschaft\",\"overlayPages.parties.description\":\"Stelle die Menschen vor, die am Hochzeitstag an deiner Seite stehen, und füge hier ihre Namen, Rollen und Fotos hinzu.\",\"overlayPages.parties.groups.0.title\":\"Brautjungfern\",\"overlayPages.parties.groups.1.title\":\"Trauzeugen\",\"overlayPages.travel.title\":\"Reise und Unterkunft\",\"overlayPages.travel.description\":\"Nutze diese Seite, um Gästen bei Anreise, Unterkunft und Wegen am Hochzeitswochenende zu helfen.\",\"overlayPages.travel.sections.0.title\":\"Flug\",\"overlayPages.travel.sections.0.subtitle\":\"Anreise\",\"overlayPages.travel.sections.0.body\":\"Füge den praktischsten Flughafen, Bahnhof oder die besten Fahrhinweise hinzu, damit Gäste ihre Reise planen können.\",\"overlayPages.travel.sections.1.title\":\"Reisehinweis\",\"overlayPages.travel.sections.1.subtitle\":\"Übernachtung\",\"overlayPages.travel.sections.1.body\":\"Teile dein Hotelkontingent, empfohlene Viertel oder Unterkunftstipps, damit Gäste wissen, wo sie übernachten können.\",\"overlayPages.travel.sections.2.title\":\"Reisehinweis\",\"overlayPages.travel.sections.2.subtitle\":\"Anfahrt zum Veranstaltungsort\",\"overlayPages.travel.sections.2.body\":\"Erkläre Parken, Shuttles, Mitfahrgelegenheiten oder Ankunftshinweise, die Gäste kennen sollten.\",\"overlayPages.travel.sections.3.title\":\"Aktivitäten\",\"overlayPages.travel.sections.3.subtitle\":\"In der Nähe\",\"overlayPages.travel.sections.3.body\":\"Füge Restaurants, Cafés, Sehenswürdigkeiten oder Wochenendaktivitäten für Gäste von außerhalb hinzu.\",\"overlayPages.registry.title\":\"Geschenkeliste\",\"overlayPages.registry.description\":\"Deine Anwesenheit bei unserer Hochzeit ist das schönste Geschenk. Wenn du uns zusätzlich etwas schenken möchtest, würde uns ein Beitrag zu unserer gemeinsamen Zukunft sehr viel bedeuten.\",\"overlayPages.registry.sections.0.title\":\"Für Gäste aus Kanada\",\"overlayPages.registry.sections.0.subtitle\":\"Interac e-Transfer\",\"overlayPages.registry.sections.0.body\":\"Wir nehmen dankbar e-Transfers an [Deine E-Mail-Adresse] entgegen.\",\"overlayPages.registry.sections.1.title\":\"Für Gäste aus den USA\",\"overlayPages.registry.sections.1.subtitle\":\"Venmo\",\"overlayPages.registry.sections.1.body\":\"Wir nehmen dankbar Beiträge per Venmo an @[Dein Venmo-Benutzername] entgegen.\",\"overlayPages.registry.sections.2.title\":\"Ein Hinweis zu Geschenken\",\"overlayPages.registry.sections.2.subtitle\":\"Danke\",\"overlayPages.registry.sections.2.body\":\"Wir sind zutiefst dankbar für eure Liebe und Unterstützung. Dass ihr dabei seid, ist das Wichtigste.\",\"overlayPages.dress-code.title\":\"Dresscode\",\"overlayPages.dress-code.description\":\"Denke an eine sommerliche Gartenparty.\",\"overlayPages.dress-code.sections.0.title\":\"Für Frauen\",\"overlayPages.dress-code.sections.0.subtitle\":\"Elegant, farbenfroh und bequem\",\"overlayPages.dress-code.sections.0.body\":\"Tee- oder bodenlange Kleider sind willkommen. Kräftige Farben und florale Muster sind gern gesehen.\\n\\nTrage bequeme Schuhe zum Gehen und Tanzen.\",\"overlayPages.dress-code.sections.1.title\":\"Für Männer\",\"overlayPages.dress-code.sections.1.subtitle\":\"Klassisch mit sommerlicher Note\",\"overlayPages.dress-code.sections.1.body\":\"Hemden und Anzüge passen perfekt. Leinen und helle Farben sind gern gesehen.\\n\\nBleibe elegant, aber luftig für einen warmen Sommerabend.\",\"overlayPages.dinner-menu.title\":\"Dinner-Menü\",\"overlayPages.dinner-menu.description\":\"Wir arbeiten mit unserem Catering daran, ein köstliches mehrgängiges Menü für alle fertigzustellen.\",\"overlayPages.dinner-menu.sections.0.title\":\"Cocktailstunde\",\"overlayPages.dinner-menu.sections.0.subtitle\":\"Servierte Canapés\",\"overlayPages.dinner-menu.sections.0.body\":\"Saisonales Törtchen mit geschlagenem Ziegenkäse und Kräutern.\\n\\nKnuspriger Garnelenspieß mit Zitrus-Aioli.\\n\\nTrüffel-Arancini mit Parmesan.\",\"overlayPages.dinner-menu.sections.1.title\":\"Hauptgang\",\"overlayPages.dinner-menu.sections.1.subtitle\":\"Serviertes Dinner\",\"overlayPages.dinner-menu.sections.1.body\":\"Kräuter-Hähnchen mit Knoblauch-Kartoffelpüree und Marktgemüse.\\n\\nMiso-glasiertes Lachsfilet mit Jasminreis und Pak Choi.\\n\\nWildpilz-Risotto mit geröstetem Spargel.\",\"overlayPages.dinner-menu.sections.2.title\":\"Ernährungswünsche\",\"overlayPages.dinner-menu.sections.2.subtitle\":\"Wir können darauf eingehen\",\"overlayPages.dinner-menu.sections.2.body\":\"Bitte gib Allergien und Ernährungswünsche in deinem RSVP an.\\n\\nEs wird vegetarische, glutenfreie und milchfreie Optionen geben.\",\"overlayPages.music.title\":\"Musik\",\"overlayPages.music.description\":\"Stimme das Wochenende mit einer Playlist ein, die sich nach euch anfühlt.\",\"overlayPages.music.playlistTitle\":\"Hochzeits-Playlist\",\"overlayPages.music.note\":\"Füge eine Spotify-URL für eine Playlist, ein Album oder einen Song ein, und wir verwandeln sie automatisch in einen Player.\"},\"vision\":{\"text\":\"Die Vision für den Abend ist einfach: all unsere liebsten Menschen an einem Ort mit einem wunderschönen Garten, Drinks und einer unvergesslichen Tanzfläche.\"},\"faq\":{\"title\":\"Fragen und Antworten\",\"intro\":\"Du findest die Antwort hier nicht?\",\"contactLabel\":\"Schreib uns\",\"items.0.question\":\"Bis wann soll ich antworten?\",\"items.0.answer\":\"Bitte antworte bis zum 20. August 2027.\",\"items.1.question\":\"Gibt es einen Dresscode?\",\"items.1.answer\":\"Ja! Denke an eine sommerliche Gartenparty.\\n\\nFür Frauen: Tee- oder bodenlange Kleider. Kräftige Farben und florale Muster sind willkommen.\\n\\nFür Männer: Hemden und Anzüge. Leinen und helle Farben sind willkommen.\\n\\nTrage bequeme Schuhe zum Spazieren (und Tanzen!) und alles, womit du dich großartig und bereit zum Feiern fühlst.\",\"items.2.question\":\"Findet die Hochzeit draußen statt?\",\"items.2.answer\":\"Ja! Die Zeremonie findet im Garten statt und der Empfang findet auf der Terrasse statt.\",\"items.3.question\":\"Wie wird das Wetter sein? Was passiert, wenn es regnet?\",\"items.3.answer\":\"Rechne mit einem warmen Nachmittag und einem kühleren Abend. Wir empfehlen, vorsichtshalber eine leichte Schicht mitzubringen.\\n\\nWenn das Wetter umschlägt, hat der Veranstaltungsort einen Plan für drinnen bereit.\",\"items.4.question\":\"Kann ich eine Begleitung oder meine Kinder mitbringen?\",\"items.4.answer\":\"Wir halten die Gästeliste klein, daher können Begleitungen und Kinder je nach Einladung begrenzt sein.\\n\\nMelde dich gern, wenn du Fragen zu deinem Haushalt hast.\",\"items.5.question\":\"Wann soll ich zur Zeremonie ankommen?\",\"items.5.answer\":\"Bitte plane, etwa 15 Minuten vor Beginn der Zeremonie anzukommen, damit alle Zeit haben, sich zu setzen.\",\"items.6.question\":\"Ich habe eine Lebensmittelallergie. Kann ich einen besonderen Wunsch angeben?\",\"items.6.answer\":\"Ja! Bitte gib Allergien oder Ernährungswünsche beim Absenden deines RSVP an, und wir tun unser Bestes, darauf einzugehen.\",\"items.7.question\":\"Gibt es Parkplätze am Veranstaltungsort?\",\"items.7.answer\":\"Nutze diese Antwort, um Park-, Ausstiegs-, Shuttle- oder Mitfahrhinweise für deinen Veranstaltungsort zu teilen.\",\"items.8.question\":\"Hilfe! Ich habe weitere Fragen.\",\"items.8.answer\":\"Schreib uns unter your-email@example.com mit allen weiteren Fragen.\\n\\nWir können es kaum erwarten, mit dir zu feiern.\"},\"footer\":{\"quote\":\"du bist mein Lieblingsmensch, mit dem ich für den Rest meines Lebens alles machen möchte.\"}},\"rsvp\":{\"rsvpSearch\":{\"title\":\"RSVP\",\"subtitle\":\"Finde deine Einladung\",\"firstNamePlaceholder\":\"Vorname\",\"lastNamePlaceholder\":\"Nachname\",\"searchButtonLabel\":\"Suchen\",\"selectPartyLabel\":\"Wähle deine Gruppe\",\"emptyState\":\"Keine Treffer gefunden. Gib bitte nur deinen Vor- oder Nachnamen genau so ein, wie er auf der Einladung steht.\"},\"rsvpOverview\":{\"title\":\"Du antwortest für\",\"selectGuestsLabel\":\"Gäste auswählen\",\"backLabel\":\"Zurück\",\"startLabel\":\"RSVP starten\",\"updateLabel\":\"RSVP aktualisieren\",\"noEventsMessage\":\"Für die ausgewählten Gäste sind derzeit keine RSVP-fähigen Events verfügbar.\",\"selectGuestError\":\"Bitte wähle mindestens einen Gast aus.\"},\"rsvpAttendance\":{\"stepName\":\"Teilnahme\",\"title\":\"Events\",\"subtitle\":\"Bist du dabei?\",\"yesLabel\":\"Ja\",\"noLabel\":\"Nein\",\"backLabel\":\"Zurück\",\"nextLabel\":\"Weiter\",\"missingResponseError\":\"Bitte wähle Ja oder Nein für jedes eingeladene Event.\"},\"rsvpDetails\":{\"stepName\":\"Details\",\"title\":\"Details\",\"subtitle\":\"Gibt es Vorlieben, die wir kennen sollten?\",\"dietaryLabel\":\"Ernährungswünsche\",\"dietaryPlaceholder\":\"z. B. vegetarisch, Nussallergie\",\"accessibilityLabel\":\"Barrierefreiheitsbedarf\",\"accessibilityPlaceholder\":\"Besondere Unterstützung nötig?\",\"noAttendingDetailsMessage\":\"Für Gäste, die nicht teilnehmen können, sind keine weiteren De
